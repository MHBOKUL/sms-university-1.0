<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
    font-family:system-ui;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    width:320px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:6px;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    background:#22c55e;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    background:#16a34a;
}

.error{
    color:#ef4444;
    font-size:14px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="box">
    <h2>Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>

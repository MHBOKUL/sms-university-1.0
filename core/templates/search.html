{% extends "base.html" %}

{% block content %}

<h2>Search Student</h2>

<form method="get">
    <input type="text" name="q" placeholder="Enter name">
    <button type="submit">Search</button>
</form>

<hr>

{% for s in students %}
    <p>
        {{ s.name }} -
        <a href="{% url 'student_profile' s.id %}">View</a>
    </p>
{% endfor %}

{% endblock %}

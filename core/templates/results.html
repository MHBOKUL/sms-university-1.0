<h2>Results</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>Student</th>
        <th>CGPA</th>
        <th>Grade</th>
    </tr>

    {% for r in results %}
    <tr>
        <td>{{ r.student.name }}</td>
        <td>{{ r.cgpa }} / 4.00</td>
        <td>{{ r.grade }}</td>
    </tr>
    {% endfor %}
</table>

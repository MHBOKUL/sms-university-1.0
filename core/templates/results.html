{% extends "base.html" %}

{% block content %}

<h2>Results</h2>

<table border="1" width="100%">
<tr>
    <th>Student</th>
    <th>CGPA</th>
    <th>Grade</th>
</tr>

{% for r in results %}
<tr>
    <td>{{ r.student.name }}</td>
    <td>{{ r.cgpa }}</td>
    <td>{{ r.grade }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}

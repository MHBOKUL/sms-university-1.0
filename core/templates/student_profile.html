{% extends "base.html" %}

{% block content %}

<h2>{{ student.name }} Profile</h2>

<p>ID: {{ student.student_id }}</p>
<p>Department: {{ student.department.name }}</p>

<h3>Marks</h3>

<ul>
{% for m in marks %}
    <li>{{ m.course.course_title }} - {{ m.marks_obtained }}</li>
{% endfor %}
</ul>

<a href="{% url 'download_transcript' student.id %}">Download PDF</a>

{% endblock %}

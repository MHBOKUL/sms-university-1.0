<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f9;
        }

        .container {
            width: 90%;
            margin: auto;
            padding-top: 20px;
        }

        h1 { margin-bottom: 20px; }

        /* Cards */
        .cards {
            display: flex;
            gap: 20px;
        }

        .card {
            flex: 1;
            padding: 20px;
            border-radius: 10px;
            color: white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .blue { background: #3498db; }
        .green { background: #2ecc71; }
        .purple { background: #9b59b6; }

        .card p {
            font-size: 30px;
            margin: 10px 0 0;
        }

        /* Table */
        table {
            width: 100%;
            margin-top: 30px;
            background: white;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        tr:hover { background: #f1f1f1; }

        a {
            text-decoration: none;
            color: #2980b9;
            font-weight: bold;
        }

        /* Layout */
        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .box {
            background: white;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🎓 Student Management Dashboard</h1>

    <!-- CARDS -->
    <div class="cards">
        <div class="card blue">
            <h2>Students</h2>
            <p>{{ students_count }}</p>
        </div>

        <div class="card green">
            <h2>Results</h2>
            <p>{{ results_count }}</p>
        </div>

        <div class="card purple">
            <h2>Status</h2>
            <p>Active</p>
        </div>
    </div>

    <!-- GRID -->
    <div class="grid">

        <!-- LEFT: TABLE -->
        <div class="box">
            <h2>📚 Latest Students</h2>

            <table>
                <tr>
                    <th>Name</th>
                    <th>ID</th>
                    <th>Dept</th>
                    <th>Action</th>
                </tr>

                {% for s in latest_students %}
                <tr>
                    <td>{{ s.name }}</td>
                    <td>{{ s.student_id }}</td>
                    <td>{{ s.department.name }}</td>
                    <td>
                        <a href="{% url 'student_profile' s.pk %}">View</a>
                    </td>
                </tr>
                {% endfor %}
            </table>
        </div>

        <!-- RIGHT: CHART -->
        <div class="box">
            <h2>📊 GPA Overview</h2>

            <canvas id="gpaChart"></canvas>
        </div>

    </div>

</div>

<!-- CHART SCRIPT (REAL DATA) -->
<script>
    const ctx = document.getElementById('gpaChart').getContext('2d');

    const gpaData = JSON.parse('{{ gpa_data|safe|escapejs }}');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ["A+", "A", "B", "C", "D", "F"],
            datasets: [{
                label: 'Students',
                data: gpaData,
                backgroundColor: [
                    '#2ecc71',
                    '#3498db',
                    '#9b59b6',
                    '#f1c40f',
                    '#e67e22',
                    '#e74c3c'
                ]
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        precision: 0
                    }
                }
            }
        }
    });
</script>

</body>
</html>

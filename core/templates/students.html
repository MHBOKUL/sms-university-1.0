<h2>Students List</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>Name</th>
        <th>ID</th>
        <th>Department</th>
        <th>Action</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.name }}</td>
        <td>{{ student.student_id }}</td>
        <td>{{ student.department.name }}</td>
        <td>
            <a href="{% url 'student_profile' student.id %}">
                View Profile
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

{% extends "base.html" %}

{% block content %}

<h2>All Students</h2>

<table border="1" width="100%">
<tr>
    <th>Name</th>
    <th>ID</th>
    <th>Dept</th>
    <th>Action</th>
</tr>

{% for s in students %}
<tr>
    <td>{{ s.name }}</td>
    <td>{{ s.student_id }}</td>
    <td>{{ s.department.name }}</td>
    <td>
        <a href="{% url 'student_profile' s.id %}">Profile</a>
    </td>
</tr>
{% endfor %}

</table>

{% endblock %}
